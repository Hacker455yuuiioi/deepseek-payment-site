<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DeepSeek Search Pro</title>
  <style>
    body {
      width: 280px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #1B4F9A, #1F6FB2);
      color: white;
      margin: 0;
      padding: 20px;
      text-align: center;
    }
    
    h1 {
      font-size: 22px;
      margin-bottom: 5px;
      font-weight: 600;
    }
    
    .subtitle {
      font-size: 12px;
      color: #EAF6FF;
      margin-bottom: 20px;
    }
    
    .stats-card {
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(5px);
      border-radius: 20px;
      padding: 16px;
      margin-bottom: 16px;
      border: 1px solid rgba(255,255,255,0.2);
    }
    
    .stat-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 0;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }
    
    .stat-row:last-child {
      border-bottom: none;
    }
    
    .stat-label {
      font-size: 13px;
      color: #EAF6FF;
    }
    
    .stat-value {
      font-size: 18px;
      font-weight: bold;
      color: white;
    }
    
    .badge {
      background: #10a37f;
      color: white;
      padding: 8px 12px;
      border-radius: 30px;
      font-size: 13px;
      font-weight: 600;
      margin: 15px 0;
      display: inline-block;
    }
    
    .button {
      background: rgba(255,255,255,0.15);
      border: 1px solid rgba(255,255,255,0.3);
      border-radius: 30px;
      padding: 8px 16px;
      color: white;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 10px;
    }
    
    .button:hover {
      background: rgba(255,255,255,0.25);
    }
    
    .footer {
      font-size: 11px;
      color: rgba(255,255,255,0.5);
      margin-top: 16px;
    }
    
    .search-bar-preview {
      background: white;
      border-radius: 30px;
      padding: 8px 12px;
      margin: 15px 0;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    .search-bar-preview input {
      flex: 1;
      border: none;
      outline: none;
      font-size: 12px;
      background: transparent;
      color: #1f2937;
    }
    
    .search-bar-preview .x {
      color: #9ca3af;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <h1>DeepSeek Search Pro</h1>
  <div class="subtitle">Search all your conversations</div>
  
  <div class="badge">🎁 COMPLETELY FREE</div>
  
  <div class="search-bar-preview">
    <span>🔍</span>
    <input placeholder="Search conversations..." disabled value="Search bar at top-right">
    <span class="x">✕</span>
  </div>
  
  <div class="stats-card">
    <div class="stat-row">
      <span class="stat-label">Searches performed</span>
      <span class="stat-value" id="searchCount">0</span>
    </div>
    <div class="stat-row">
      <span class="stat-label">Conversations opened</span>
      <span class="stat-value" id="clickCount">0</span>
    </div>
    <div class="stat-row">
      <span class="stat-label">Using since</span>
      <span class="stat-value" id="installDate">-</span>
    </div>
  </div>
  
  <button class="button" id="resetStats">Reset Stats</button>
  
  <div class="footer">
    <div>🔍 Search bar at top-right corner</div>
    <div>✕ Click X to hide, 🔍 to show again</div>
    <div style="margin-top: 8px;">✨ All features free forever</div>
  </div>
  
  <script src="popup.js"></script>
</body>
</html>
