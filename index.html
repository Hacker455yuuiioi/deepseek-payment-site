<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>DeepSeek Search Pro - Upgrade</title>
  
  <!-- PayPal SDK -->
  <script src="https://www.paypal.com/sdk/js?client-id=BAAuM2hI4IaFDYw_psLDyHY-W5gL5SthKlH4c4IG5tfp3tzuKyKXJF0rMY7qqZWtI0F7NalJ4czGsoeNLU&components=hosted-buttons&disable-funding=venmo&currency=USD"></script>
  
  <style>
    /* RESET - Force horizontal text everywhere */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      writing-mode: horizontal-tb !important;
      text-orientation: mixed;
    }
    
    html, body {
      width: 100%;
      min-height: 100vh;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #1B4F9A, #1F6FB2);
      display: flex;
      justify-content: center;
      align-items: center;
      margin: 0;
      padding: 16px;
    }
    
    /* Card - responsive sizing */
    .payment-card {
      background: white;
      border-radius: 28px;
      padding: 32px 24px;
      width: 100%;
      max-width: 480px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.2);
      margin: auto;
    }
    
    /* Title - responsive font */
    .product-title {
      font-size: clamp(22px, 6vw, 28px);
      font-weight: 700;
      color: #1f2937;
      margin-bottom: 24px;
      text-align: center;
      line-height: 1.3;
      word-break: break-word;
    }
    
    /* Pricing section */
    .pricing {
      background: #f9fafb;
      border-radius: 20px;
      padding: 24px 16px;
      margin-bottom: 24px;
      text-align: center;
    }
    
    .price-row {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
      gap: 8px 12px;
      margin-bottom: 8px;
    }
    
    .old-price {
      font-size: clamp(16px, 4vw, 20px);
      color: #9ca3af;
      text-decoration: line-through;
    }
    
    .new-price {
      font-size: clamp(28px, 8vw, 36px);
      font-weight: 700;
      color: #10a37f;
      line-height: 1.2;
    }
    
    .discount-badge {
      background: #10a37f;
      color: white;
      font-size: clamp(12px, 3vw, 14px);
      font-weight: 600;
      padding: 4px 12px;
      border-radius: 30px;
      white-space: nowrap;
    }
    
    .savings {
      font-size: clamp(13px, 3.5vw, 14px);
      color: #10a37f;
      font-weight: 500;
      margin: 8px 0;
    }
    
    .description {
      font-size: clamp(14px, 4vw, 16px);
      color: #4b5563;
      margin: 16px 0 0;
      line-height: 1.5;
      text-align: center;
      border-top: 1px solid #e5e7eb;
      padding-top: 20px;
    }
    
    /* Features - responsive */
    .features {
      margin: 24px 0 20px;
    }
    
    .feature-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 0;
      color: #4b5563;
      font-size: clamp(14px, 3.5vw, 15px);
      line-height: 1.4;
    }
    
    .feature-item:before {
      content: "✓";
      color: #10a37f;
      font-weight: bold;
      font-size: clamp(16px, 4vw, 18px);
      flex-shrink: 0;
    }
    
    /* PayPal button container */
    .paypal-button-container {
      margin: 20px 0 16px;
      width: 100%;
      min-height: 45px;
    }
    
    /* Force PayPal button to be horizontal */
    .paypal-button-container iframe,
    .paypal-button-container div,
    .paypal-button-container button {
      max-width: 100% !important;
      width: 100% !important;
      display: block !important;
    }
    
    /* Guarantee text */
    .guarantee {
      text-align: center;
      color: #6b7280;
      font-size: clamp(12px, 3vw, 13px);
      margin-top: 16px;
      padding-top: 16px;
      border-top: 1px solid #e5e7eb;
    }
    
    /* Loading state */
    .loading {
      text-align: center;
      color: #6b7280;
      padding: 16px;
      background: #f9fafb;
      border-radius: 12px;
      font-size: clamp(13px, 3.5vw, 14px);
    }
    
    /* Error state */
    .error-message {
      color: #ef4444;
      padding: 16px;
      text-align: center;
      background: #fee2e2;
      border-radius: 12px;
      font-size: clamp(13px, 3.5vw, 14px);
    }
    
    /* Desktop-specific adjustments */
    @media (min-width: 768px) {
      .payment-card {
        padding: 40px;
      }
      
      .price-row {
        gap: 12px;
      }
      
      .feature-item {
        padding: 10px 0;
      }
    }
    
    /* Small mobile adjustments */
    @media (max-width: 380px) {
      .payment-card {
        padding: 24px 16px;
      }
      
      .pricing {
        padding: 20px 12px;
      }
      
      .price-row {
        flex-direction: column;
        gap: 6px;
      }
    }
  </style>
</head>
<body>
  <div class="payment-card">
    <!-- Product Title -->
    <h1 class="product-title">DeepSeek Conversation Search Pro</h1>
    
    <!-- Pricing Information -->
    <div class="pricing">
      <div class="price-row">
        <span class="old-price">$9.99 USD</span>
        <span class="new-price">$8.99 USD</span>
        <span class="discount-badge">10% off</span>
      </div>
      <div class="savings">Save $1.00 USD</div>
      <div class="description">
        Unlock unlimited conversation history on DeepSeek!
      </div>
    </div>
    
    <!-- Features -->
    <div class="features">
      <div class="feature-item">Access all conversations (7+ days old)</div>
      <div class="feature-item">Full message search across all chats</div>
      <div class="feature-item">Keyword highlighting in conversations</div>
    </div>
    
    <!-- ONLY PayPal Button -->
    <div id="paypal-container-2AXBD4Q9J8V2G" class="paypal-button-container"></div>
    
    <!-- Guarantee -->
    <div class="guarantee">
      30-day money-back guarantee
    </div>
  </div>

  <script>
    // Show loading while PayPal initializes
    const container = document.getElementById('paypal-container-2AXBD4Q9J8V2G');
    container.innerHTML = '<div class="loading">Loading secure checkout...</div>';
    
    // Your exact PayPal code
    paypal.HostedButtons({
      hostedButtonId: "2AXBD4Q9J8V2G",
      onSuccess: function(details) {
        chrome.storage.local.set({
          payment_status: {
            isPaid: true,
            paidAt: Date.now(),
            expiryDate: Date.now() + (365 * 24 * 60 * 60 * 1000)
          }
        }, function() {
          window.location.href = 'success.html';
        });
      },
      onError: function(err) {
        console.error('PayPal Error:', err);
        container.innerHTML = '<div class="error-message">⚠️ Error loading PayPal. Please refresh.</div>';
      }
    }).render("#paypal-container-2AXBD4Q9J8V2G");
  </script>
  
  <!-- Handle return from PayPal -->
  <script>
    if (document.referrer.includes('paypal.com') || window.location.search.includes('payment_success')) {
      chrome.storage.local.set({
        payment_status: {
          isPaid: true,
          paidAt: Date.now(),
          expiryDate: Date.now() + (365 * 24 * 60 * 60 * 1000)
        }
      }, function() {
        window.location.href = 'success.html';
      });
    }
  </script>
</body>
</html>
