<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DeepSeek Search Pro - Upgrade</title>
  
  <!-- PayPal SDK - Your exact code -->
  <script src="https://www.paypal.com/sdk/js?client-id=BAAuM2hI4IaFDYw_psLDyHY-W5gL5SthKlH4c4IG5tfp3tzuKyKXJF0rMY7qqZWtI0F7NalJ4czGsoeNLU&components=hosted-buttons&disable-funding=venmo&currency=USD"></script>
  
  <style>
    /* RESET - Ensure horizontal text */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      text-orientation: mixed;
      writing-mode: horizontal-tb !important;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #1B4F9A, #1F6FB2);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      margin: 0;
      padding: 20px;
    }
    
    /* Clean card layout */
    .payment-card {
      background: white;
      border-radius: 24px;
      padding: 40px;
      max-width: 480px;
      width: 100%;
      box-shadow: 0 20px 40px rgba(0,0,0,0.2);
    }
    
    /* Product title - normal horizontal text */
    .product-title {
      font-size: 28px;
      font-weight: 700;
      color: #1f2937;
      margin-bottom: 24px;
      text-align: center;
      line-height: 1.3;
    }
    
    /* Pricing section */
    .pricing {
      background: #f9fafb;
      border-radius: 16px;
      padding: 24px;
      margin-bottom: 30px;
      text-align: center;
    }
    
    .price-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin-bottom: 8px;
    }
    
    .old-price {
      font-size: 20px;
      color: #9ca3af;
      text-decoration: line-through;
    }
    
    .new-price {
      font-size: 36px;
      font-weight: 700;
      color: #10a37f;
    }
    
    .discount-badge {
      background: #10a37f;
      color: white;
      font-size: 14px;
      font-weight: 600;
      padding: 4px 12px;
      border-radius: 30px;
    }
    
    .savings {
      font-size: 14px;
      color: #10a37f;
      font-weight: 500;
      margin-top: 4px;
    }
    
    .description {
      font-size: 16px;
      color: #4b5563;
      margin: 20px 0 0 0;
      line-height: 1.5;
      text-align: center;
      border-top: 1px solid #e5e7eb;
      padding-top: 20px;
    }
    
    /* PayPal button container - clean and centered */
    .paypal-button-container {
      margin: 20px 0 10px;
      width: 100%;
      min-height: 50px;
    }
    
    /* Feature list (optional, keep minimal) */
    .features {
      margin: 25px 0 15px;
      text-align: left;
    }
    
    .feature-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 0;
      color: #4b5563;
      font-size: 15px;
    }
    
    .feature-item:before {
      content: "✓";
      color: #10a37f;
      font-weight: bold;
      font-size: 18px;
    }
    
    /* Guarantee text */
    .guarantee {
      text-align: center;
      color: #6b7280;
      font-size: 13px;
      margin-top: 20px;
      padding-top: 20px;
      border-top: 1px solid #e5e7eb;
    }
    
    /* Loading state */
    .loading {
      text-align: center;
      color: #6b7280;
      padding: 20px;
      background: #f9fafb;
      border-radius: 8px;
    }
  </style>
</head>
<body>
  <div class="payment-card">
    <!-- Product Title - Normal Horizontal Text -->
    <h1 class="product-title">DeepSeek Conversation Search Pro</h1>
    
    <!-- Pricing Information - Clean Layout -->
    <div class="pricing">
      <div class="price-row">
        <span class="old-price">$9.99 USD</span>
        <span class="new-price">$8.99 USD</span>
        <span class="discount-badge">10% off</span>
      </div>
      <div class="savings">Save $1.00 USD</div>
      <div class="description">
        Unlock unlimited conversation history on DeepSeek!
      </div>
    </div>
    
    <!-- Minimal feature list (optional) -->
    <div class="features">
      <div class="feature-item">Access all conversations (7+ days old)</div>
      <div class="feature-item">Full message search across all chats</div>
      <div class="feature-item">Keyword highlighting</div>
    </div>
    
    <!-- ONLY PayPal Button - Clean and Centered -->
    <div id="paypal-container-2AXBD4Q9J8V2G" class="paypal-button-container"></div>
    
    <!-- Simple Guarantee -->
    <div class="guarantee">
      30-day money-back guarantee
    </div>
  </div>

  <script>
    // Show loading while PayPal initializes
    document.getElementById('paypal-container-2AXBD4Q9J8V2G').innerHTML = '<div class="loading">Loading secure checkout...</div>';
    
    // Your exact PayPal code
    paypal.HostedButtons({
      hostedButtonId: "2AXBD4Q9J8V2G",
      onSuccess: function(details) {
        // Payment succeeded
        chrome.storage.local.set({
          payment_status: {
            isPaid: true,
            paidAt: Date.now(),
            expiryDate: Date.now() + (365 * 24 * 60 * 60 * 1000)
          }
        }, function() {
          window.location.href = 'success.html';
        });
      },
      onError: function(err) {
        console.error('PayPal Error:', err);
        document.getElementById('paypal-container-2AXBD4Q9J8V2G').innerHTML = 
          '<div style="color: #ef4444; padding: 15px; text-align: center; background: #fee2e2; border-radius: 8px;">' +
          'Error loading PayPal. Please refresh.</div>';
      }
    }).render("#paypal-container-2AXBD4Q9J8V2G");
  </script>
  
  <!-- Handle return from PayPal -->
  <script>
    if (document.referrer.includes('paypal.com') || window.location.search.includes('payment_success')) {
      chrome.storage.local.set({
        payment_status: {
          isPaid: true,
          paidAt: Date.now(),
          expiryDate: Date.now() + (365 * 24 * 60 * 60 * 1000)
        }
      }, function() {
        window.location.href = 'success.html';
      });
    }
  </script>
</body>
</html>
