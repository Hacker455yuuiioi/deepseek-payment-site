<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Payment Successful</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #1B4F9A, #1F6FB2);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      margin: 0;
      padding: 20px;
    }
    .success-card {
      background: white;
      border-radius: 24px;
      padding: 40px;
      max-width: 400px;
      width: 100%;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    h1 {
      color: #1f2937;
      margin-bottom: 20px;
    }
    .checkmark {
      font-size: 80px;
      color: #10a37f;
      margin-bottom: 20px;
    }
    p {
      color: #6b7280;
      margin-bottom: 30px;
      line-height: 1.6;
    }
    .button {
      background: #10a37f;
      color: white;
      padding: 12px 30px;
      border-radius: 30px;
      text-decoration: none;
      display: inline-block;
    }
  </style>
</head>
<body>
  <div class="success-card">
    <div class="checkmark">✅</div>
    <h1>Payment Successful!</h1>
    <p>Thank you for upgrading to DeepSeekTool Pro.<br>All conversations are now unlocked.</p>
    <a href="https://chat.deepseek.com" class="button">Return to DeepSeek</a>
  </div>
  <script>
    // Auto-close after 5 seconds
    setTimeout(() => window.close(), 5000);
  </script>
</body>
</html>
