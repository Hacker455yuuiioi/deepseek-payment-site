<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DeepSeekTool Pro - Upgrade</title>
  
  <!-- Part 1: YOUR EXACT PAYPAL SDK CODE -->
  <script src="https://www.paypal.com/sdk/js?client-id=BAAuM2hI4IaFDYw_psLDyHY-W5gL5SthKlH4c4IG5tfp3tzuKyKXJF0rMY7qqZWtI0F7NalJ4czGsoeNLU&components=hosted-buttons&disable-funding=venmo&currency=USD"></script>
  
  <style>
    /* Reset any default styling that could cause vertical text */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #1B4F9A, #1F6FB2);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      margin: 0;
      padding: 20px;
    }
    
    .payment-card {
      background: white;
      border-radius: 24px;
      padding: 40px;
      max-width: 500px;
      width: 100%;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    
    h1 {
      color: #1f2937;
      margin-bottom: 10px;
      font-size: 32px;
      text-align: center;
    }
    
    .price {
      font-size: 48px;
      font-weight: bold;
      color: #10a37f;
      margin: 20px 0;
      text-align: center;
    }
    
    .price small {
      font-size: 18px;
      color: #6b7280;
    }
    
    .feature-list {
      list-style: none;
      padding: 0;
      margin: 30px 0;
      text-align: left;
    }
    
    .feature-list li {
      padding: 12px 0;
      border-bottom: 1px solid #e5e7eb;
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 16px;
    }
    
    .feature-list li:before {
      content: "✓";
      color: #10a37f;
      font-weight: bold;
      font-size: 18px;
      margin-right: 10px;
    }
    
    /* PayPal button container - ensures horizontal display */
    #paypal-container-2AXBD4Q9J8V2G {
      margin: 30px auto;
      width: 100%;
      min-height: 50px;
    }
    
    /* Force PayPal button to render horizontally */
    #paypal-container-2AXBD4Q9J8V2G iframe,
    #paypal-container-2AXBD4Q9J8V2G div,
    #paypal-container-2AXBD4Q9J8V2G button {
      max-width: 100% !important;
      display: inline-block !important;
    }
    
    /* Payment methods row - horizontal */
    .payment-methods {
      display: flex;
      justify-content: center;
      gap: 15px;
      margin: 20px 0;
      color: #6b7280;
      font-size: 14px;
      flex-wrap: wrap;
    }
    
    .payment-methods span {
      background: #f3f4f6;
      padding: 6px 15px;
      border-radius: 20px;
      display: inline-block;
    }
    
    .guarantee {
      color: #6b7280;
      font-size: 14px;
      margin-top: 30px;
      padding-top: 20px;
      border-top: 1px solid #e5e7eb;
      text-align: center;
    }
    
    /* Loading state */
    .loading {
      text-align: center;
      color: #6b7280;
      padding: 20px;
      background: #f9f9f9;
      border-radius: 8px;
      width: 100%;
    }
    
    /* Ensure all text is horizontal */
    p, div, span, h1, h2, h3 {
      text-orientation: mixed;
      writing-mode: horizontal-tb;
    }
  </style>
</head>
<body>
  <div class="payment-card">
    <h1>DeepSeekTool Pro</h1>
    <div class="price">$8.99 <small>/year</small></div>
    
    <ul class="feature-list">
      <li>Access all conversations (8+ days old)</li>
      <li>Full message search across all chats</li>
      <li>Keyword highlighting in conversations</li>
      <li>Priority support</li>
    </ul>
    
    <!-- PayPal button will render here - HORIZONTAL -->
    <div id="paypal-container-2AXBD4Q9J8V2G"></div>
    
    <div class="payment-methods">
      <span>VISA</span>
      <span>Mastercard</span>
      <span>Discover</span>
      <span>American Express</span>
    </div>
    
    <div class="guarantee">
      30-day money-back guarantee
    </div>
  </div>

  <script>
    // Show loading state while PayPal initializes
    document.getElementById('paypal-container-2AXBD4Q9J8V2G').innerHTML = '<div class="loading">Loading secure checkout...</div>';
    
    // YOUR EXACT PAYPAL CODE - with success handler
    paypal.HostedButtons({
      hostedButtonId: "2AXBD4Q9J8V2G",
      onSuccess: function(details) {
        // Payment succeeded - update extension storage
        chrome.storage.local.set({
          payment_status: {
            isPaid: true,
            paidAt: Date.now(),
            expiryDate: Date.now() + (365 * 24 * 60 * 60 * 1000)
          }
        }, function() {
          // Redirect to success page
          window.location.href = 'success.html';
        });
      },
      onError: function(err) {
        console.error('PayPal Error:', err);
        document.getElementById('paypal-container-2AXBD4Q9J8V2G').innerHTML = 
          '<div style="color: #ef4444; padding: 20px; text-align: center; background: #fee2e2; border-radius: 8px;">' +
          '⚠️ Error loading PayPal. Please refresh and try again.</div>';
      }
    }).render("#paypal-container-2AXBD4Q9J8V2G");
  </script>
  
  <!-- Handle return from PayPal -->
  <script>
    // Check if returning from PayPal
    if (document.referrer.includes('paypal.com') || window.location.search.includes('payment_success')) {
      chrome.storage.local.set({
        payment_status: {
          isPaid: true,
          paidAt: Date.now(),
          expiryDate: Date.now() + (365 * 24 * 60 * 60 * 1000)
        }
      }, function() {
        window.location.href = 'success.html';
      });
    }
  </script>
</body>
</html>
